kind = "web"
previewPath = "/"
title = "NOC Ticket Management System"
version = "1.0.0"
id = "artifacts/noc-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21749

[services.development]
run = "pnpm --filter @workspace/noc-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/noc-dashboard", "run", "build" ]
publicDir = "artifacts/noc-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21749"
BASE_PATH = "/"
